<!doctype html>
<html lang="es">
	<head>
		<meta charset="utf-8" />
		<title>MatchHome - Sistema de Gestión Inmobiliaria</title>
		<meta name="description" content="Sistema de gestión inmobiliaria para administrar propiedades, contactos y agenda" />
		<link rel="icon" href="%sveltekit.assets%/favicon.png" />
		<meta name="viewport" content="width=device-width, initial-scale=1" />
		%sveltekit.head%
		
		<!-- Google Fonts - Poppins -->
		<link rel="preconnect" href="https://fonts.googleapis.com">
		<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
		<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">
		
		<!-- Font Awesome -->
		<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" integrity="sha512-iecdLmaskl7CVkqkXNQ/ZH/XLlvWZOJyj7Yy7tcenmpD1ypASozpmT/E0iPtmFIB46ZmdtAc9eNBvH0H/ZpiBw==" crossorigin="anonymous" referrerpolicy="no-referrer" />	
	</head>
	<body data-sveltekit-preload-data="hover">
		<main id="main" role="main">
			<div style="display: contents" title="Contenido principal de la aplicación">%sveltekit.body%</div>
		</main>
		<!-- Announcer para lectores de pantalla -->
		<div id="svelte-announcer" aria-live="assertive" aria-atomic="true" aria-label="Anuncios de navegación"></div>
	</body>
</html>
